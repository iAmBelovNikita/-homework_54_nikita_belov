{% extends "base.html" %}

{% block nav %}
  <div class="d-flex gap-2">
    <a href="{% url 'products_view' %}" class="btn btn-outline-primary">
      Products
    </a>

    <a href="#" class="btn btn-primary">
      Add Product
    </a>

    <a href="{% url 'category_add_view' %}" class="btn btn-primary">
      Add Category
    </a>
  </div>
{% endblock %}

{% block content %}
  <div class="mt-4">
    <h2 class="mb-4">Add Category</h2>

    {% if error %}
      <div class="alert alert-danger">
        {{ error }}
      </div>
    {% endif %}

    <form method="post" class="w-50">
      {% csrf_token %}

      <div class="mb-3">
        <input type="text"
               name="title"
               class="form-control"
               placeholder="Title"
               value="{{ title }}"
               required>
      </div>

      <div class="mb-3">
        <textarea name="description"
                  class="form-control"
                  rows="5"
                  placeholder="Description">{{ description }}</textarea>
      </div>

      <button type="submit" class="btn btn-primary">
        Create
      </button>
    </form>
  </div>
{% endblock %}
